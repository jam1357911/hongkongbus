<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>香港巴士到站時間</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--panel-bg:#fff;--border:#e5e4e7;--card-muted:rgba(244,243,236,0.6);--text:#6b6375;--text-h:#08060d;--accent:#aa3bff;--accent-bg:rgba(170,59,255,0.1);--accent-border:rgba(170,59,255,0.5);--input-bg:#fff;--shadow:rgba(0,0,0,0.08)0 4px 12px}
@media(prefers-color-scheme:dark){
:root{--panel-bg:#16171d;--border:#2e303a;--card-muted:rgba(47,48,58,0.5);--text:#9ca3af;--text-h:#f3f4f6;--accent:#c084fc;--accent-bg:rgba(192,132,252,0.15);--accent-border:rgba(192,132,252,0.5);--input-bg:#1f2028;--shadow:rgba(0,0,0,0.4)0 4px 12px}}
body{font:16px/1.45 system-ui,sans-serif;background:var(--panel-bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100svh}
#root{display:flex;flex-direction:column;gap:16px;padding:16px;max-width:1200px;margin:0 auto}
.board-panel,.builder-panel{background:var(--panel-bg);border:1px solid var(--border);border-radius:24px;padding:20px;box-shadow:var(--shadow)}
.board-panel{order:0}.builder-panel{order:2}
.tabs-bar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.tab-list{display:flex;gap:8px;flex-wrap:wrap}
.tab-button{border:1px solid transparent;background:var(--card-muted);color:var(--text-h);padding:10px 14px;border-radius:999px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
.tab-button.active,.tab-button:hover{border-color:var(--accent);background:var(--accent-bg)}
.tab-actions{display:flex;gap:8px}
.tab-meta{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:16px}
.tab-meta .field{flex:1}
.field{display:flex;flex-direction:column;gap:6px}
.field span{font-size:14px;font-weight:700;color:var(--text-h)}
.field input,.section-title input{width:100%;border:1px solid var(--border);border-radius:14px;background:var(--input-bg);color:var(--text-h);padding:10px 14px;font:inherit;font-size:14px;box-sizing:border-box}
.panel-header{margin-bottom:16px}
.panel-header h2{font-size:18px;color:var(--text-h)}
.panel-header p{font-size:14px}
.secondary-button{background:var(--card-muted);color:var(--text-h);border:1px solid transparent;padding:10px 14px;border-radius:14px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
.secondary-button:hover{border-color:var(--accent-border)}
.secondary-button:disabled{opacity:.5;cursor:not-allowed}
.fastest-panel{margin-bottom:20px}
.fastest-panel-header h3{font-size:15px;color:var(--text-h);font-weight:700;margin:0 0 4px}
.fastest-panel-header p{font-size:13px;color:var(--text)}
.fastest-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.fastest-card{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:4px}
.fastest-rank{font-size:13px;font-weight:700;color:var(--accent)}
.fastest-card strong{font-size:20px;color:var(--text-h)}
.fastest-card span{font-size:14px;color:var(--text-h)}
.fastest-card small{font-size:13px;color:var(--text)}
.favourite-grid{display:grid;gap:12px}
.eta-card{border:1px solid var(--border);border-radius:20px;padding:16px;background:#c62828}
.eta-card-header{display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:12px}
.badge-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.route-badge{display:inline-flex;align-items:center;background:var(--accent-bg);color:#fff;padding:8px 12px;border-radius:999px}
.route-badge-text{font-size:26px;line-height:1;font-weight:800}
.operator-badge{display:inline-flex;align-items:center;background:rgba(255,255,255,.18);color:#fff6f6;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:700}
.eta-card h3{font-size:17px;font-weight:700;color:#fff6f6;margin-bottom:4px}
.eta-card p,.eta-card .muted,.eta-card .eta-footer,.eta-card .eta-row span,.eta-card .eta-row small{color:#fff6f6}
.eta-card-actions{display:flex;gap:8px;flex-shrink:0}
.icon-button{background:rgba(255,255,255,.16);color:#fff;border:1px solid transparent;padding:8px 12px;border-radius:12px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;white-space:nowrap}
.icon-button:hover{border-color:rgba(255,255,255,.55)}
.eta-list{display:grid;gap:8px}
.eta-row{display:flex;justify-content:space-between;gap:12px;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,.16)}
.eta-row div{display:flex;flex-direction:column;gap:2px}
.eta-row strong{font-size:18px;color:#fff;font-weight:800}
.eta-row span{font-size:14px}.eta-row small{font-size:13px;color:var(--text)}
.eta-footer{margin-top:12px;font-size:13px;opacity:.85}
.empty-card{padding:32px;border-radius:20px;border:1px dashed var(--border);background:var(--card-muted);text-align:center}
.empty-card h3{font-size:16px;color:var(--text-h);margin-bottom:8px}
.empty-card p{font-size:14px;color:var(--text)}
.section-block{margin-bottom:16px}
.section-block h3{font-size:15px;font-weight:700;color:var(--text-h);margin-bottom:8px}
.section-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px}
.section-title h3{font-size:15px;font-weight:700;color:var(--text-h);margin:0}
.section-title input{max-width:200px}
.result-list,.choice-list,.stop-list{display:grid;gap:8px;max-height:300px;overflow:auto}
.result-card,.choice-chip,.stop-row{text-align:left;background:var(--card-muted);color:var(--text-h);border-radius:14px;padding:12px;border:1px solid transparent;cursor:pointer;font:inherit}
.result-card:hover,.choice-chip:hover,.stop-row:hover{border-color:var(--accent-border)}
.result-card.selected,.choice-chip.selected,.stop-row.selected,.stop-row.selected{border-color:var(--accent);background:var(--accent-bg)}
.result-card strong,.choice-chip strong{display:block;font-size:15px;margin-bottom:4px}
.result-card span,.choice-chip span,.stop-name{font-size:13px;color:var(--text)}
.stop-row{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:center}
.stop-seq{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:999px;background:rgba(255,255,255,.55);color:var(--text-h);font-weight:700;font-size:13px}
.muted{font-size:14px;color:var(--text)}
.error-text{font-size:14px;color:#dc2626}
.primary-button{width:100%;background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;border:none;padding:12px 18px;border-radius:14px;cursor:pointer;font:inherit;font-size:15px;font-weight:700}
.primary-button:hover{opacity:.92}
.primary-button:disabled{opacity:.5;cursor:not-allowed}
@media(min-width:768px){.fastest-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body><div id="root"></div>
<script>

var K = 'hk-bus-db-v3'
var CK = 'hk-bus-col-v2'

function uid() {
  var n = 0
  return function (){ return 'id-' + (++n) + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,8) }
}()

function defTab(i) { return { id: uid(), name: '\u5206\u9801 ' + i, favourites: [] } }

function loadSt() {
  try {
    var r = localStorage.getItem(K)
    if (r) { var p = JSON.parse(r); if (p && p.tabs && p.tabs.length) return p }
  } catch (e) {}
  var t = defTab(1)
  return { tabs: [t], activeTabId: t.id }
}

function loadCol() {
  try {
    var r = localStorage.getItem(CK)
    if (r) { var p = JSON.parse(r); if (p && typeof p === 'object') return p }
  } catch (e) {}
  return {}
}

function fmt(eta) {
  if (!eta) return '--'
  var m = Math.round((new Date(eta).getTime() - Date.now()) / 60000)
  return m <= 0 ? '\u5373\u5c07\u5230\u7ad9' : m + '\u5206\u9418'
}

function fk(f) { return f.operator + ':' + f.route + ':' + f.direction + ':' + f.serviceType + ':' + f.stopId }
function dc(d) { return d === 'outbound' ? 'O' : 'I' }
function bt(b) { return b === 'O' ? 'outbound' : 'inbound' }

function fetchOk(u, cb) {
  fetch(u, { headers: { accept: 'application/json' } })
    .then(function (r) { if (!r.ok) throw new Error('ERR' + r.status); return r.json() })
    .then(function (d) { cb(null, d) })
    .catch(function (e) { cb(e, null) })
}

function fetchNull(u, cb) {
  fetch(u, { headers: { accept: 'application/json' } })
    .then(function (r) { if (!r.ok) { cb(null, null); return }; return r.json() })
    .then(function (d) { cb(null, d) })
    .catch(function (e) { cb(null, null) })
}

function loadCtbDir(rt, cb) {
  var dirs = []
  var p1 = 0
  var p2 = 0
  function check() {
    if (p1 < 2 || p2 < 4) return
    var out = []
    for (var i = 0; i < dirs.length; i++) { if (dirs[i]) out.push(dirs[i]) }
    cb(out)
  }
  for (var i = 0; i < 2; i++) { loadOne(i === 0 ? 'outbound' : 'inbound') }
  function loadOne(dir) {
    fetchNull(
      'https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/' + encodeURIComponent(rt) + '/' + dir,
      function (e, cr) {
        p1++
        if (!cr || !cr.data || !cr.data.length) { check(); return }
        fetchNull(
          'https://rt.data.gov.hk/v2/transport/citybus/stop/' + encodeURIComponent(cr.data[0].stop),
          function (e2, fr) {
            p2++
            fetchNull(
              'https://rt.data.gov.hk/v2/transport/citybus/stop/' + encodeURIComponent(cr.data[cr.data.length - 1].stop),
              function (e3, lr) {
                p2++
                var fn = fr && fr.data ? fr.data.name_tc : '\u8d77\u9ede'
                var ln = lr && lr.data ? lr.data.name_tc : '\u7d42\u9ede'
                var idx = dir === 'outbound' ? 0 : 1
                dirs[idx] = {
                  direction: dir,
                  directionCode: dir === 'outbound' ? 'O' : 'I',
                  serviceType: '1',
                  label: fn + ' -> ' + ln,
                  stopCount: cr.data.length
                }
                check()
              }
            )
          }
        )
      }
    )
  }
}

function loadCtbStops(rt, dir, cb) {
  fetchNull(
    'https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/' + encodeURIComponent(rt) + '/' + encodeURIComponent(dir),
    function (e, cr) {
      if (!cr || !cr.data) { cb([]); return }
      var out = []
      var cnt = 0
      var done = false
      var total = cr.data.length
      for (var i = 0; i < cr.data.length; i++) { fetchStop(i) }
      function fetchStop(idx) {
        var stop = cr.data[idx]
        fetchNull(
          'https://rt.data.gov.hk/v2/transport/citybus/stop/' + encodeURIComponent(stop.stop),
          function (e2, s) {
            cnt++
            out[idx] = {
              stopId: stop.stop,
              seq: stop.seq,
              nameTc: s && s.data ? s.data.name_tc : '\u7ad9' + stop.stop,
              nameEn: s && s.data ? s.data.name_en : 'Stop ' + stop.stop
            }
            if (!done && cnt >= total) { done = true; cb(out) }
          }
        )
      }
    }
  )
}

function App() {
  var init = loadSt()
  var ts = init.tabs
  var ai = init.activeTabId
  var tState = React.useState(ts)
  var aState = React.useState(ai)
  var tabs = tState[0]
  var activeId = aState[0]
  var setT = tState[1]
  var setA = aState[1]
  var cState = React.useState(loadCol())
  var col = cState[0]
  var setCol = cState[1]
  var rqState = React.useState('')
  var rrState = React.useState([])
  var srState = React.useState(null)
  var drState = React.useState([])
  var sdState = React.useState(null)
  var stState = React.useState([])
  var siState = React.useState('')
  var sfState = React.useState('')
  var buState = React.useState(false)
  var ldState = React.useState(false)
  var lsState = React.useState(false)
  var erState = React.useState(null)
  var emState = React.useState({})
  var rq = rqState[0]; var setQ = rqState[1]
  var rrs = rrState[0]; var setRr = rrState[1]
  var srs = srState[0]; var setSr = srState[1]
  var drs = drState[0]; var setDr = drState[1]
  var sds = sdState[0]; var setSd = sdState[1]
  var sts = stState[0]; var setSt = stState[1]
  var sis = siState[0]; var setSi = siState[1]
  var sfs = sfState[0]; var setSf = sfState[1]
  var bus = buState[0]; var setBu = buState[1]
  var lds = ldState[0]; var setLd = ldState[1]
  var lss = lsState[0]; var setLs = lsState[1]
  var ers = erState[0]; var setEr = erState[1]
  var etaMap = emState[0]; var setEm = emState[1]
  var at = tabs.find(function (x) { return x.id === activeId }) || tabs[0]
  var ss = sts.find(function (x) { return x.stopId === sis }) || null
  var fs = sts.filter(function (x) {
    var k = sfs.trim().toLowerCase()
    return !k || (String(x.seq) + x.nameTc + x.nameEn).toLowerCase().indexOf(k) !== -1
  })

  // save state
  React.useEffect(function () {
    try { localStorage.setItem(K, JSON.stringify({ tabs: tabs, activeTabId: activeId })) } catch (e) {}
  }, [tabs, activeId])
  React.useEffect(function () {
    try { localStorage.setItem(CK, JSON.stringify(col)) } catch (e) {}
  }, [col])

  // route search
  React.useEffect(function () {
    var tm = setTimeout(function () {
      setBu(true)
      setEr(null)
      var w = rq.trim().toLowerCase()
      var all = []
      var seen = {}
      var tab1 = 0
      var tab2 = 0
      function done() {
        if (tab1 + tab2 < 2) return
        all.sort(function (a, b) { return a.rt.localeCompare(b.rt, 'en', { numeric: true }) })
        setRr(w ? all.filter(function (i) { return i.mt.indexOf(w) !== -1 }) : all.slice(0, 80))
        setBu(false)
      }
      fetchOk('https://data.etabus.gov.hk/v1/transport/kmb/route/', function (e, kmb) {
        tab1 = 1
        if (!e && kmb) {
          kmb.data.forEach(function (r) {
            if (!seen[r.route]) {
              seen[r.route] = 1
              all.push({
                op: 'kmb',
                on: '\u4e5d\u5df4/\u9f8d\u904b',
                rt: r.route,
                sm: r.orig_tc + ' -> ' + r.dest_tc,
                mt: (r.route + r.orig_tc + r.dest_tc + r.orig_en + r.dest_en).toLowerCase()
              })
            }
          })
        }
        done()
      })
      fetchNull('https://rt.data.gov.hk/v2/transport/citybus/route/CTB', function (e, ctb) {
        tab2 = 1
        if (ctb) {
          ctb.data.forEach(function (r) {
            if (!seen[r.route]) {
              seen[r.route] = 1
              all.push({
                op: 'ctb',
                on: '\u57ce\u5df4',
                rt: r.route,
                sm: r.orig_tc + ' -> ' + r.dest_tc,
                mt: (r.route + r.orig_tc + r.dest_tc + r.orig_en + r.dest_en).toLowerCase()
              })
            }
          })
        }
        done()
      })
    }, 350)
    return function () { clearTimeout(tm) }
  }, [rq])

  // directions
  React.useEffect(function () {
    if (!srs) { setDr([]); setSd(null); setSt([]); setSi(''); return }
    var cancelled = false
    setLd(true); setEr(null); setSd(null); setSt([]); setSi('')
    if (srs.op === 'kmb') {
      fetchOk('https://data.etabus.gov.hk/v1/transport/kmb/route/', function (e, kmb) {
        if (cancelled) return
        if (e) { setEr(e.message); setLd(false); return }
        var opts = kmb.data.filter(function (x) { return x.route.toLowerCase() === srs.rt.toLowerCase() }).map(function (x) {
          return {
            direction: bt(x.bound),
            directionCode: x.bound,
            serviceType: x.service_type,
            label: x.orig_tc + ' -> ' + x.dest_tc + (x.service_type !== '1' ? '(\u7279' + x.service_type + ')' : ''),
            stopCount: 0
          }
        })
        var seen = {}
        var out = []
        opts.forEach(function (o) {
          var k = o.direction + '-' + o.serviceType
          if (!seen[k]) { seen[k] = 1; out.push(o) }
        })
        setDr(out)
        setLd(false)
      })
    } else {
      loadCtbDir(srs.rt, function (dirs) { if (!cancelled) { setDr(dirs); setLd(false) } })
    }
    return function () { cancelled = true }
  }, [srs ? srs.op : null, srs ? srs.rt : null])

  // stops
  React.useEffect(function () {
    if (!srs || !sds) { setSt([]); setSi(''); return }
    var cancelled = false
    setLs(true); setEr(null); setSi('')
    if (srs.op === 'kmb') {
      fetchOk(
        'https://data.etabus.gov.hk/v1/transport/kmb/route-stop/' + encodeURIComponent(srs.rt) + '/' + encodeURIComponent(sds.direction) + '/' + encodeURIComponent(sds.serviceType),
        function (e1, rs) {
          if (cancelled) return
          if (e1) { setEr(e1.message); setLs(false); return }
          fetchOk('https://data.etabus.gov.hk/v1/transport/kmb/stop', function (e2, as) {
            if (cancelled) return
            if (e2) { setEr(e2.message); setLs(false); return }
            var sm = {}
            as.data.forEach(function (s) { sm[s.stop] = { n: s.name_tc, e: s.name_en } })
            var out = rs.data.map(function (r) {
              return {
                stopId: r.stop,
                seq: Number(r.seq),
                nameTc: sm[r.stop] ? sm[r.stop].n : '\u7ad9' + r.stop.slice(0, 6),
                nameEn: sm[r.stop] ? sm[r.stop].e : 'Stop ' + r.stop.slice(0, 6)
              }
            })
            setSt(out)
            setLs(false)
          })
        }
      )
    } else {
      loadCtbStops(srs.rt, sds.direction, function (out) { if (!cancelled) { setSt(out); setLs(false) } })
    }
    return function () { cancelled = true }
  }, [srs ? srs.rt : null, srs ? srs.op : null, sds ? sds.direction : null, sds ? sds.serviceType : null])

  // ETA refresh
  React.useEffect(function () {
    if (!at || !at.favourites || !at.favourites.length) return
    var cancelled = false
    function loadEtas() {
      setEm(function (p) {
        var n = {}
        for (var k in p) n[k] = p[k]
        at.favourites.forEach(function (f) { n[f.id] = { loading: true, items: [], error: null, ts: null } })
        return n
      })
      at.favourites.forEach(function (f) {
        var url
        var fn
        if (f.op === 'kmb') {
          url = 'https://data.etabus.gov.hk/v1/transport/kmb/eta/' + encodeURIComponent(f.stopId) + '/' + encodeURIComponent(f.rt) + '/' + encodeURIComponent(f.serviceType)
          fn = fetchOk
        } else {
          url = 'https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/' + encodeURIComponent(f.stopId) + '/' + encodeURIComponent(f.rt)
          fn = fetchNull
        }
        fn(url, function (err, r) {
          if (cancelled) return
          var data
          if (err) {
            data = { loading: false, items: [], error: err.message, ts: null }
          } else if (!r || !r.data) {
            data = { loading: false, items: [], error: null, ts: new Date().toISOString() }
          } else {
            var items = r.data.filter(function (x) {
              var ok = x.dir === dc(f.direction) && x.eta
              if (f.op === 'kmb') ok = ok && String(x.service_type) === f.serviceType
              return ok
            }).sort(function (a, b) { return a.eta_seq - b.eta_seq }).slice(0, 3).map(function (x) {
              return { eta: x.eta, seq: x.eta_seq, rt: x.rmk_tc || '', re: x.rmk_en || '', dt: x.dest_tc, de: x.dest_en }
            })
            data = { loading: false, items: items, error: null, ts: new Date().toISOString() }
          }
          setEm(function (p) {
            var n = {}
            for (var k in p) n[k] = p[k]
            n[f.id] = data
            return n
          })
        })
      })
    }
    setTimeout(loadEtas, 100)
    loadEtas()
    var timer = setInterval(loadEtas, 30000)
    return function () { cancelled = true; clearInterval(timer) }
  }, [at])

  // helper functions
  function addTab() { var t2 = defTab(tabs.length + 1); setT(function (p) { return p.concat([t2]) }); setA(t2.id) }
  function remTab(id) { if (tabs.length < 2) return; setT(function (p) { return p.filter(function (x) { return x.id !== id }) }) }
  function upName(v) { setT(function (p) { return p.map(function (x) { return x.id === at.id ? Object.assign({}, x, { name: v }) : x }) }) }
  function addFav() {
    if (!at || !srs || !sds || !ss) return
    var nf = {
      id: uid(), op: srs.op, on: srs.on, rt: srs.rt, sm: srs.sm,
      dir: sds.direction, dl: sds.label, stype: sds.serviceType,
      sid: ss.stopId, snt: ss.nameTc, sne: ss.nameEn
    }
