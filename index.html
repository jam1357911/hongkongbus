<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>香港巴士到站時間</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--panel-bg:#fff;--border:#e5e4e7;--card-muted:rgba(244,243,236,0.6);--text:#6b6375;--text-h:#08060d;--accent:#aa3bff;--accent-bg:rgba(170,59,255,0.1);--accent-border:rgba(170,59,255,0.5);--input-bg:#fff;--shadow:rgba(0,0,0,0.08)0 4px 12px}
@media(prefers-color-scheme:dark){
:root{--panel-bg:#16171d;--border:#2e303a;--card-muted:rgba(47,48,58,0.5);--text:#9ca3af;--text-h:#f3f4f6;--accent:#c084fc;--accent-bg:rgba(192,132,252,0.15);--accent-border:rgba(192,132,252,0.5);--input-bg:#1f2028;--shadow:rgba(0,0,0,0.4)0 4px 12px}
}
body{font:16px/1.45 system-ui,'Segoe UI',Roboto,sans-serif;background:var(--panel-bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100svh}
#root{display:flex;flex-direction:column;gap:16px;padding:16px;max-width:1200px;margin:0 auto}
.board-panel{background:var(--panel-bg);border:1px solid var(--border);border-radius:24px;padding:20px;box-shadow:var(--shadow);order:0}
.builder-panel{background:var(--panel-bg);border:1px solid var(--border);border-radius:24px;padding:20px;box-shadow:var(--shadow);order:2}
.tabs-bar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.tab-list{display:flex;gap:8px;flex-wrap:wrap}
.tab-button{border:1px solid transparent;background:var(--card-muted);color:var(--text-h);padding:10px 14px;border-radius:999px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;transition:border-color 0.2s,background 0.2s}
.tab-button.active{border-color:var(--accent);background:var(--accent-bg)}
.tab-button:hover{border-color:var(--accent-border)}
.tab-actions{display:flex;gap:8px}
.tab-meta{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:16px}
.tab-meta .field{flex:1}
.field{display:flex;flex-direction:column;gap:6px}
.field span{font-size:14px;font-weight:700;color:var(--text-h)}
.field input,.section-title input{width:100%;border:1px solid var(--border);border-radius:14px;background:var(--input-bg);color:var(--text-h);padding:10px 14px;font:inherit;font-size:14px}
.panel-header{margin-bottom:16px}
.panel-header h2{font-size:18px;color:var(--text-h)}
.panel-header p{font-size:14px}
.secondary-button{background:var(--card-muted);color:var(--text-h);border:1px solid transparent;padding:10px 14px;border-radius:14px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;transition:border-color 0.2s,background 0.2s}
.secondary-button:hover{border-color:var(--accent-border);transform:translateY(-1px)}
.secondary-button:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.fastest-panel{margin-bottom:20px}
.fastest-panel-header{margin-bottom:12px}
.fastest-panel-header h3{font-size:15px;color:var(--text-h);font-weight:700;margin:0 0 4px}
.fastest-panel-header p{font-size:13px;color:var(--text)}
.fastest-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.fastest-card{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:4px}
.fastest-rank{font-size:13px;font-weight:700;color:var(--accent)}
.fastest-card strong{font-size:20px;color:var(--text-h)}
.fastest-card span{font-size:14px;color:var(--text-h)}
.fastest-card small{font-size:13px;color:var(--text)}
.favourite-grid{display:grid;gap:12px}
.eta-card{border:1px solid var(--border);border-radius:20px;padding:16px;background:#c62828}
.eta-card-header{display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:12px}
.badge-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.route-badge{display:inline-flex;align-items:center;background:var(--accent-bg);color:#fff;padding:8px 12px;border-radius:999px}
.route-badge-text{font-size:26px;line-height:1;font-weight:800;letter-spacing:-0.5px}
.operator-badge{display:inline-flex;align-items:center;background:rgba(255,255,255,0.18);color:#fff6f6;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:700}
.eta-card h3{font-size:17px;font-weight:700;color:#fff6f6;margin-bottom:4px}
.eta-card p,.eta-card .muted,.eta-card .eta-footer,.eta-card .eta-row span,.eta-card .eta-row small{color:#fff6f6}
.eta-card-actions{display:flex;gap:8px;flex-shrink:0}
.icon-button{background:rgba(255,255,255,0.16);color:#fff;border:1px solid transparent;padding:8px 12px;border-radius:12px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;transition:border-color 0.2s,background 0.2s;white-space:nowrap}
.icon-button:hover{border-color:rgba(255,255,255,0.55)}
.eta-list{display:grid;gap:8px}
.eta-row{display:flex;justify-content:space-between;gap:12px;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,0.16)}
.eta-row div{display:flex;flex-direction:column;gap:2px}
.eta-row strong{font-size:18px;color:#fff;font-weight:800}
.eta-row span{font-size:14px}
.eta-row small{font-size:13px;color:var(--text)}
.eta-footer{margin-top:12px;font-size:13px;opacity:0.85}
.empty-card{padding:32px;border-radius:20px;border:1px dashed var(--border);background:var(--card-muted);text-align:center}
.empty-card h3{font-size:16px;color:var(--text-h);margin-bottom:8px}
.empty-card p{font-size:14px;color:var(--text)}
.section-block{margin-bottom:16px}
.section-block h3{font-size:15px;font-weight:700;color:var(--text-h);margin-bottom:8px}
.section-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px}
.section-title h3{font-size:15px;font-weight:700;color:var(--text-h);margin:0}
.section-title input{max-width:200px}
.result-list,.choice-list,.stop-list{display:grid;gap:8px;max-height:300px;overflow:auto}
.result-card,.choice-chip,.stop-row{text-align:left;background:var(--card-muted);color:var(--text-h);border-radius:14px;padding:12px;border:1px solid transparent;cursor:pointer;font:inherit;transition:border-color 0.2s,background 0.2s,transform 0.2s}
.result-card:hover,.choice-chip:hover,.stop-row:hover{border-color:var(--accent-border);transform:translateY(-1px)}
.result-card.selected,.choice-chip.selected,.stop-row.selected{border-color:var(--accent);background:var(--accent-bg)}
.result-card strong,.choice-chip strong{display:block;font-size:15px;margin-bottom:4px}
.result-card span,.choice-chip span,.stop-name{font-size:13px;color:var(--text)}
.stop-row{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:center}
.stop-seq{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:999px;background:rgba(255,255,255,0.55);color:var(--text-h);font-weight:700;font-size:13px}
.muted{font-size:14px;color:var(--text)}
.error-text{font-size:14px;color:#dc2626}
.primary-button{width:100%;background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;border:none;padding:12px 18px;border-radius:14px;cursor:pointer;font:inherit;font-size:15px;font-weight:700;transition:opacity 0.2s,transform 0.2s}
.primary-button:hover{transform:translateY(-1px);opacity:0.92}
.primary-button:disabled{opacity:0.5;cursor:not-allowed;transform:none}
@media(min-width:768px){.fastest-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
window.addEventListener('error',function(e){console.error('GLOBAL_ERROR:',e.message,e.filename,e.lineno)})
const{useState,useEffect,useMemo}=React

const STORAGE_KEY='hk-bus-db-v3'
const COLLAPSE_KEY='hk-bus-col-v2'
let idCounter=0
function uid(){return'id-'+(++idCounter)+'-'+Date.now()+'-'+Math.random().toString(36).slice(2,8)}
function defTab(i){return{id:uid(),name:'分頁 '+i,favourites:[]}}
function loadState(){try{var raw=localStorage.getItem(STORAGE_KEY);if(raw){var p=JSON.parse(raw);if(p&&Array.isArray(p.tabs)&&p.tabs.length)return p}}catch(e){console.error('loadState',e)}var t=defTab(1);return{tabs:[t],activeTabId:t.id}}
function loadCollapsed(){try{var raw=localStorage.getItem(COLLAPSE_KEY);if(raw){var p=JSON.parse(raw);if(p&&typeof p==='object')return p}}catch(e){console.error('loadCollapsed',e)}return{}}
function fmt(eta){if(!eta)return'--';var m=Math.round((new Date(eta).getTime()-Date.now())/60000);return m<=0?'即將到站':m+' 分鐘'}
function fkey(f){return f.operator+':'+f.route+':'+f.direction+':'+f.serviceType+':'+f.stopId}
function dirCode(d){return d==='outbound'?'O':'I'}
function boundText(b){return b==='O'?'outbound':'inbound'}

async function getJSON(url){var r=await fetch(url,{headers:{accept:'application/json'}});if(!r.ok)throw new Error('API '+r.status);return r.json()}
async function getSafe(url){try{var r=await fetch(url,{headers:{accept:'application/json'}});if(!r.ok)return null;return r.json()}catch(e){return null}}
async function getKmbR(){return getJSON('https://data.etabus.gov.hk/v1/transport/kmb/route/')}
async function getCtbR(){return getSafe('https://rt.data.gov.hk/v2/transport/citybus/route/CTB')}
async function getKmbS(){return getJSON('https://data.etabus.gov.hk/v1/transport/kmb/stop')}
async function getKmbRS(r,d,st){return getJSON('https://data.etabus.gov.hk/v1/transport/kmb/route-stop/'+encodeURIComponent(r)+'/'+encodeURIComponent(d)+'/'+encodeURIComponent(st))}
async function getCtbRS(r,d){return getSafe('https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/'+encodeURIComponent(r)+'/'+encodeURIComponent(d))}
async function getCtbStop(s){return getSafe('https://rt.data.gov.hk/v2/transport/citybus/stop/'+encodeURIComponent(s))}
async function getKmbE(s,r,st){return getJSON('https://data.etabus.gov.hk/v1/transport/kmb/eta/'+encodeURIComponent(s)+'/'+encodeURIComponent(r)+'/'+encodeURIComponent(st))}
async function getCtbE(s,r){return getSafe('https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/'+encodeURIComponent(s)+'/'+encodeURIComponent(r))}

function App(){
var init=useMemo(loadState,[])
var[T,setT]=useState(init.tabs)
var[A,setA]=useState(init.activeTabId)
var[C,setC]=useState(loadCollapsed)
var[q,setQ]=useState('')
var[rr,setRr]=useState([])
var[sr,setSr]=useState(null)
var[dr,setDr]=useState([])
var[sd,setSd]=useState(null)
var[st,setSt]=useState([])
var[si,setSi]=useState('')
var[sf,setSf]=useState('')
var[bu,setBu]=useState(false)
var[ld,setLd]=useState(false)
var[ls,setLs]=useState(false)
var[er,setEr]=useState(null)
var[em,setEm]=useState({})

var at=T.find(function(t){return t.id===A})||T[0]
var ss=st.find(function(s){return s.stopId===si})||null
var fs=st.filter(function(s){var k=sf.trim().toLowerCase();return!k||(String(s.seq)+s.nameTc+s.nameEn).toLowerCase().indexOf(k)!==-1})

useEffect(function(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({tabs:T,activeTabId:A}))}catch(e){console.error('saveTabs',e)}},[T,A])
useEffect(function(){try{localStorage.setItem(COLLAPSE_KEY,JSON.stringify(C))}catch(e){console.error('saveColl',e)}},[C])
useEffect(function(){if(!T.some(function(t){return t.id===A}))setA(T[0]?T[0].id:'')},[T,A])

useEffect(function(){var t=setTimeout(async function(){setBu(true);setEr(null)
try{var w=q.trim().toLowerCase();var[kmb,ctb]=await Promise.all([getKmbR(),getCtbR()]);var a=[],d={}
if(kmb)kmb.data.forEach(function(r){if(!d[r.route]){d[r.route]=1;a.push({op:'kmb',on:'九巴/龍運',rt:r.route,sm:r.orig_tc+' -> '+r.dest_tc,mt:(r.route+' '+r.orig_tc+' '+r.dest_tc+' '+r.orig_en+' '+r.dest_en).toLowerCase())}}})
if(ctb)ctb.data.forEach(function(r){if(!d[r.route]){d[r.route]=1;a.push({op:'ctb',on:'城巴',rt:r.route,sm:r.orig_tc+' -> '+r.dest_tc,mt:(r.route+' '+r.orig_tc+' '+r.dest_tc+' '+r.orig_en+' '+r.dest_en).toLowerCase())}}})
a.sort(function(a,b){return a.rt.localeCompare(b.rt,'en',{numeric:true})});setRr(w?a.filter(function(i){return i.mt.indexOf(w)!==-1}):a.slice(0,80))}catch(e){setEr(e.message)}finally{setBu(false)}},350);return function(){clearTimeout(t)}},[q])

useEffect(function(){if(!sr){setDr([]);setSd(null);setSt([]);setSi('');return}
var cancelled=false
async function load(){setLd(true);setEr(null);setSd(null);setSt([]);setSi('')
try{if(sr.op==='kmb'){var r=await getKmbR();var opts=r.data.filter(function(x){return x.route.toLowerCase()===sr.rt.toLowerCase()}).map(function(x){return{direction:boundText(x.bound),directionCode:x.bound,serviceType:x.service_type,label:x.orig_tc+' -> '+x.dest_tc+(x.service_type!=='1'?'(特'+x.service_type+')':''),stopCount:0}});var dp={},out=[];opts.forEach(function(o){var k=o.direction+'-'+o.serviceType;if(!dp[k]){dp[k]=1;out.push(o)}});if(!cancelled)setDr(out)}
else{var dirs=[];for(var i=0;i<2;i++){var d=['outbound','inbound'][i];try{var cr=await getCtbRS(sr.rt,d);if(cr&&cr.data&&cr.data.length>0){var fr=await getCtbStop(cr.data[0].stop);var lr=await getCtbStop(cr.data[cr.data.length-1].stop);var fn=fr&&fr.data?fr.data.name_tc:'起點';var ln=lr&&lr.data?lr.data.name_tc:'終點';dirs.push({direction:d,directionCode:d==='outbound'?'O':'I',serviceType:'1',label:fn+' -> '+ln,stopCount:cr.data.length})}}catch(e){}}if(!cancelled)setDr(dirs)}
}catch(e){if(!cancelled)setEr(e.message)}finally{if(!cancelled)setLd(false)}}
load();return function(){cancelled=true}},[sr&&sr.op,sr&&sr.rt])

useEffect(function(){if(!sr||!sd){setSt([]);setSi('');return}
var cancelled=false
async function load(){setLs(true);setEr(null);setSi('')
try{if(sr.op==='kmb'){var[rs,as]=await Promise.all([getKmbRS(sr.rt,sd.direction,sd.serviceType),getKmbS()]);var sm={};as.data.forEach(function(s){sm[s.stop]={n:s.name_tc,e:s.name_en}})
var out=rs.data.map(function(r){return{stopId:r.stop,seq:Number(r.seq),nameTc:sm[r.stop]?sm[r.stop].n:'站'+r.stop.slice(0,6),nameEn:sm[r.stop]?sm[r.stop].e:'Stop '+r.stop.slice(0,6)}});if(!cancelled)setSt(out)}
else{var cr=await getCtbRS(sr.rt,sd.direction);if(!cr||!cr.data){if(!cancelled)setSt([]);return}var out2=[];for(var i=0;i<cr.data.length;i++){var rec=cr.data[i];try{var s=await getCtbStop(rec.stop);out2.push({stopId:rec.stop,seq:rec.seq,nameTc:s&&s.data?s.data.name_tc:'站'+rec.stop,nameEn:s&&s.data?s.data.name_en:'Stop '+rec.stop})}catch(e){out2.push({stopId:rec.stop,seq:rec.seq,nameTc:'站'+rec.stop,nameEn:'Stop '+rec.stop})}}if(!cancelled)setSt(out2)}
}catch(e){if(!cancelled)setEr(e.message)}finally{if(!cancelled)setLs(false)}}
load();return function(){cancelled=true}},[sr&&sr.rt,sr&&sr.op,sd&&sd.direction,sd&&sd.serviceType])

useEffect(function(){if(!at||!at.favourites||at.favourites.length===0)return
var cancelled=false
async function refresh(){try{setEm(function(p){var n={};for(var k in p)n[k]=p[k];at.favourites.forEach(function(f){n[f.id]={loading:true,items:[],error:null,ts:null}});return n})
var ps=at.favourites.map(function(f){return new Promise(function(resolve){setTimeout(function(){resolve()},0)})});await Promise.all(ps)
var results=await Promise.all(at.favourites.map(async function(f){try{if(f.op==='kmb'){var r=await getKmbE(f.stopId,f.rt,f.serviceType);var items=r.data.filter(function(x){return x.dir===dirCode(f.direction)&&String(x.service_type)===f.serviceType&&x.eta}).sort(function(a,b){return a.eta_seq-b.eta_seq}).slice(0,3).map(function(x){return{eta:x.eta,seq:x.eta_seq,rt:x.rmk_tc||'',re:x.rmk_en||'',dt:x.dest_tc,de:x.dest_en}});return[f.id,{loading:false,items:items,error:null,ts:new Date().toISOString()}]}
else{var r=await getCtbE(f.stopId,f.rt);if(!r||!r.data)return[f.id,{loading:false,items:[],error:null,ts:new Date().toISOString()}];var items=r.data.filter(function(x){return x.dir===dirCode(f.direction)&&x.eta}).sort(function(a,b){return a.eta_seq-b.eta_seq}).slice(0,3).map(function(x){return{eta:x.eta,seq:x.eta_seq,rt:x.rmk_tc||'',re:x.rmk_en||'',dt:x.dest_tc,de:x.dest_en}});return[f.id,{loading:false,items:items,error:null,ts:new Date().toISOString()}]}
}catch(e){return[f.id,{loading:false,items:[],error:e.message,ts:null}]}}))
if(!cancelled)setEm(function(p){var n={};for(var k in p)n[k]=p[k];results.forEach(function(r){n[r[0]]=r[1]});return n})}catch(e){console.error('etaRefresh',e)}}
refresh();var timer=setInterval(refresh,30000);return function(){cancelled=true;clearInterval(timer)}},[at])

function addTab(){var t=defTab(T.length+1);setT(function(p){return p.concat([t])});setA(t.id)}
function remTab(id){if(T.length<2)return;setT(function(p){return p.filter(function(t){return t.id!==id})})}
function upName(v){setT(function(p){return p.map(function(t){return t.id===at.id?Object.assign({},t,{name:v}):t})})}
function addFav(){if(!at||!sr||!sd||!ss)return
var nf={id:uid(),op:sr.op,on:sr.on,rt:sr.rt,sm:sr.sm,dir:sd.direction,dl:sd.label,stype:sd.serviceType,sid:ss.stopId,snt:ss.nameTc,sne:ss.nameEn}
setT(function(p){return p.map(function(t){if(t.id!==at.id)return t;if(t.favourites.some(function(x){return fkey(x)===fkey(nf)}))return t;return Object.assign({},t,{favourites:t.favourites.concat([nf])})})})}
function remFav(id){setT(function(p){return p.map(function(t){return t.id===at.id?Object.assign({},t,{favourites:t.favourites.filter(function(x){return x.id!==id})}):t})});setC(function(p){var n={};for(var k in p)n[k]=p[k];delete n[id];return n})}
function togCol(id){setC(function(p){var n={};for(var k in p)n[k]=p[k];n[id]=!n[id];return n})}

var fast=useMemo(function(){if(!at||!at.favourites||at.favourites.length<3)return[]
var br={};at.favourites.forEach(function(f){var s=em[f.id];if(!s||s.loading||s.error||!s.items||!s.items.length)return;var first=s.items[0];if(!first||!first.eta)return;if(!br[f.rt]||new Date(first.eta).getTime()<new Date(br[f.rt].eta).getTime())br[f.rt]={fid:f.id,rt:f.rt,snt:f.snt,on:f.on,eta:first.eta}})
var sv=[];for(var k in br)sv.push(br[k]);sv.sort(function(a,b){return new Date(a.eta).getTime()-new Date(b.eta).getTime()});if(sv.length<3)return[];return sv.slice(0,3)
},[at,em])

return(<>
<div className="board-panel">
<div className="tabs-bar">
<div className="tab-list">{T.map(function(t){return(<button key={t.id} type="button" className={'tab-button'+(t.id===A?' active':'')} onClick={function(){setA(t.id)}}>{t.name}</button>)})}</div>
<div className="tab-actions"><button type="button" className="secondary-button" onClick={addTab}>新增分頁</button><button type="button" className="secondary-button" onClick={function(){remTab(at.id)}} disabled={T.length<2}>刪除分頁</button></div>
</div>
<div className="tab-meta"><label className="field"><span>分頁名稱</span><input value={at.name} onChange={function(e){upName(e.target.value)}}/></label><p className="muted">資料保存在瀏覽器本機。</p></div>
{fast.length===3?<div className="fastest-panel"><div className="fastest-panel-header"><h3>最快到站 3 條路線</h3><p>根據這個分頁每個站的首班 ETA 排序</p></div><div className="fastest-grid">{fast.map(function(item,i){return(<div key={item.fid} className="fastest-card"><span className="fastest-rank">#{i+1}</span><strong>{item.rt}</strong><span>{item.snt}</span><small>{item.on} · {fmt(item.eta)} · {new Date(item.eta).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'})}</small></div>)})}</div></div>:null}
<div className="favourite-grid">{at.favourites.map(function(f){var s=em[f.id]||{loading:true,items:[],error:null,ts:null};var c=C[f.id]||false;var vi=c?s.items.slice(0,1):s.items
return(<div key={f.id} className="eta-card">
<div className="eta-card-header"><div><div className="badge-row"><span className="route-badge"><span className="route-badge-text">{f.rt}</span></span><span className="operator-badge">{f.on}</span></div><h3>{f.snt}</h3><p>{f.dl}</p></div>
<div className="eta-card-actions"><button type="button" className="icon-button" onClick={function(){togCol(f.id)}}>{c?'顯示全部':'只顯示首班'}</button><button type="button" className="icon-button" onClick={function(){remFav(f.id)}}>移除</button></div>
</div>
<div className="eta-list">{s.loading?<p className="muted">更新 ETA 中...</p>:null}{s.error?<p className="error-text">{s.error}</p>:null}{!s.loading&&!s.error&&(!s.items||s.items.length===0)?<p className="muted">暫時沒有未來班次資料。</p>:null}{vi.map(function(item){return(<div key={f.id+'-'+item.seq} className="eta-row"><div><strong>{fmt(item.eta)}</strong><span>{item.eta?new Date(item.eta).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}):'--'}</span></div><div><span>{item.dt}</span><small>{item.rt||'正常班次'}</small></div></div>)})}</div>
<p className="eta-footer">{f.sm}{s.ts?' · 更新於 '+new Date(s.ts).toLocaleTimeString('zh-HK'):''}</p>
</div>)})}
{!at.favourites||at.favourites.length===0?<div className="empty-card"><h3>這個分頁還沒有站點</h3><p>往下拉加入新站點，搜尋路線、選方向和站點，然後加入目前分頁即可。</p></div>:null}
</div>
</div>

<div className="builder-panel">
<div className="panel-header"><h2>加入新站點</h2><p>搜尋路線，再選方向與站點。</p></div>
<label className="field"><span>搜尋路線</span><input value={q} onChange={function(e){setQ(e.target.value)}} placeholder="例如 1A、970、機場"/></label>
<div className="result-list">{bu?<p className="muted">搜尋中...</p>:null}{er?<p className="error-text">{er}</p>:null}{rr.map(function(item){return(<button key={item.op+'-'+item.rt} type="button" className={'result-card'+(sr&&sr.op===item.op&&sr.rt===item.rt?' selected':'')} onClick={function(){setSr(item);setEr(null)}}><strong>{item.on} {item.rt}</strong><span>{item.sm}</span></button>)})}</div>

{sr?<div className="section-block"><h3>方向</h3>{ld?<p className="muted">載入方向中...</p>:null}
<div className="choice-list">{dr.map(function(item){return(<button key={item.direction+'-'+item.serviceType} type="button" className={'choice-chip'+(sd&&sd.direction===item.direction&&sd.serviceType===item.serviceType?' selected':'')} onClick={function(){setSd(item)}}><strong>{item.label}</strong><span>{(item.direction==='outbound'?'去程':'回程')+(item.serviceType!=='1'?'·班次'+item.serviceType:'')+(item.stopCount>0?'·'+item.stopCount+'站':'')}</span></button>)})}
{!ld&&sr&&dr.length===0?<p className="muted">這條路線目前沒有方向資料。</p>:null}
</div></div>:null}

{sr&&sd?<div className="section-block"><div className="section-title"><h3>站點</h3><input value={sf} onChange={function(e){setSf(e.target.value)}} placeholder="過濾站點"/></div>{ls?<p className="muted">載入站點中...</p>:null}
<div className="stop-list">{fs.map(function(item){return(<button key={item.stopId} type="button" className={'stop-row'+(si===item.stopId?' selected':'')} onClick={function(){setSi(item.stopId)}}><span className="stop-seq">{item.seq}</span><span className="stop-name">{item.nameTc}</span></button>)})}</div>
</div>:null}

{er?<p className="error-text">{er}</p>:null}
<button type="button" className="primary-button" onClick={addFav} disabled={!sr||!sd||!ss}>加入目前分頁</button>
</div>
</>)
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App))
</script>
</body>
</html>
